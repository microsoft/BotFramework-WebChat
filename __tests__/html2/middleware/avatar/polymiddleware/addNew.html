<!doctype html>
<!-- Tests polymiddleware can add a new avatar type that legacy middleware does not handle -->
<html lang="en-US">
  <head>
    <link href="/assets/index.css" rel="stylesheet" type="text/css" />
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1"
        }
      }
    </script>
    <script crossorigin="anonymous" src="/test-harness.js"></script>
    <script crossorigin="anonymous" src="/test-page-object.js"></script>
    <script crossorigin="anonymous" src="/__dist__/webchat-es5.js"></script>
  </head>
  <body>
    <main id="webchat"></main>
    <script type="module">
      import { createElement, memo } from 'react';

      run(async function () {
        const {
          testHelpers: { createDirectLineEmulator },
          WebChat: {
            middleware: { avatarComponent, createAvatarPolymiddleware }
          }
        } = window;

        const { directLine, store } = createDirectLineEmulator();

        // GIVEN: A custom avatar component that renders a custom avatar UI.
        const CustomAvatar = memo(function CustomAvatar() {
          return createElement('div', {
            style: {
              alignItems: 'center',
              backgroundColor: 'Blue',
              borderRadius: '50%',
              color: 'White',
              display: 'flex',
              fontSize: 12,
              height: 40,
              justifyContent: 'center',
              width: 40
            }
          }, 'NEW');
        });

        // GIVEN: Polymiddleware to replace the avatar with a custom one.
        const polymiddleware = [
          createAvatarPolymiddleware(_next => request => {
            // Verify this new polymiddleware handles the request, not the legacy middleware.
            return avatarComponent(CustomAvatar, {});
          })
        ];

        WebChat.renderWebChat(
          {
            directLine,
            polymiddleware,
            store,
            styleOptions: {
              botAvatarInitials: 'WC',
              userAvatarInitials: 'WW'
            }
          },
          document.getElementById('webchat')
        );

        await pageConditions.uiConnected();

        await directLine.emulateIncomingActivity({ text: 'Hello from bot.', type: 'message' });
        await directLine.emulateIncomingActivity({ from: { role: 'user' }, text: 'Hello from user.', type: 'message' });

        await pageConditions.numActivitiesShown(2);
        await host.snapshot('local');
      });
    </script>
  </body>
</html>
