<!doctype html>
<html lang="en-US">
  <head>
    <link href="/assets/index.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main id="webchat"></main>
    <script type="importmap">
      {
        "imports": {
          "botframework-webchat": "/__dist__/packages/bundle/static/botframework-webchat.js",
          "react": "/__dist__/packages/bundle/static/react.js",
          "react-dom": "/__dist__/packages/bundle/static/react-dom.js"
        }
      }
    </script>
    <script type="module">
      import '/test-harness.mjs';
      import '/test-page-object.mjs';

      import { createStoreWithOptions, renderWebChat, testIds } from 'botframework-webchat';
      import createStaticChatHistoryChatAdapter from './asset/createStaticChatHistoryChatAdapter.js';

      // TODO: Should find ways to eliminate this line.
      window.WebChat = { createStoreWithOptions, testIds };

      testHelpers.hideKnownError();

      run(async function () {
        const directLine = createStaticChatHistoryChatAdapter([
          {
            from: { id: 'bot', role: 'bot' },
            id: 'a-00001',
            text: 'Hello, World!',
            timestamp: new Date(Date.now() - 60_000).toISOString(),
            type: 'message'
          },
          {
            from: { id: 'user', role: 'user' },
            id: 'a-00002',
            text: 'Aloha!',
            timestamp: new Date(Date.now()).toISOString(),
            type: 'message'
          }
        ]);

        renderWebChat(
          {
            directLine,
            disabled: true,
            store: testHelpers.createStore(),
            styleOptions: { hideSendBox: true }
          },
          document.getElementById('webchat')
        );

        await pageConditions.uiConnected();

        await pageConditions.numActivitiesShown(2);
        await host.snapshot('local');
      });
    </script>
  </body>
</html>
