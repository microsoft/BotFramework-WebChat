<!doctype html>
<html lang="en-US">
  <head>
    <link href="/assets/index.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main id="webchat"></main>
    <script type="importmap">
      {
        "imports": {
          "botframework-webchat": "/__dist__/packages/bundle/static/botframework-webchat.js",
          "react": "/__dist__/packages/bundle/static/react.js",
          "react-dom": "/__dist__/packages/bundle/static/react-dom.js"
        }
      }
    </script>
    <script type="module">
      import '/test-harness.mjs';
      import '/test-page-object.mjs';

      import { createStoreWithOptions, renderWebChat, testIds } from 'botframework-webchat';
      import isActivitySentFromBot from './asset/isActivitySentFromBot.js';
      import transformActivity from './asset/transformActivity.js';

      // TODO: Should find ways to eliminate this line.
      window.WebChat = { createStoreWithOptions, testIds };

      testHelpers.hideKnownError();

      run(async function () {
        const { directLine: rawDirectLine, store } = testHelpers.createDirectLineEmulator();

        const directLine = transformActivity(rawDirectLine, function* (value) {
          if (!isActivitySentFromBot(value)) {
            yield value;

            return;
          }

          yield {
            ...value,
            channelData: {
              feedbackLoop: {
                type: 'default',
                disclaimer: 'This is a test disclaimer message'
              }
            }
          };
        });

        renderWebChat(
          { directLine, store, styleOptions: { feedbackActionsPlacement: 'activity-actions' } },
          document.getElementById('webchat')
        );

        await pageConditions.uiConnected();

        await directLine.emulateIncomingActivity({
          from: { id: 'bot', role: 'bot' },
          text: 'Hello, World!',
          type: 'message'
        });

        await directLine.emulateIncomingActivity({
          from: { id: 'user', role: 'user' },
          text: 'Aloha!',
          type: 'message'
        });

        await directLine.emulateIncomingActivity({
          entities: [
            {
              '@context': 'https://schema.org',
              '@id': '',
              '@type': 'Message',
              keywords: ['AIGeneratedContent'],
              type: 'https://schema.org/Message'
            }
          ],
          from: { id: 'bot', role: 'bot' },
          text: 'With AI-generated content badge',
          type: 'message'
        });

        await host.snapshot('local');
      });
    </script>
  </body>
</html>
