<!doctype html>
<html lang="en-US">
  <head>
    <link href="/assets/index.css" rel="stylesheet" type="text/css" />
    <script crossorigin="anonymous" src="/test-harness.js"></script>
    <script crossorigin="anonymous" src="/test-page-object.js"></script>
    <script crossorigin="anonymous" src="/__dist__/webchat-es5.js"></script>
  </head>
  <body>
    <main id="webchat"></main>
    <script>
      const { createDirectLine, createStoreWithOptions, renderWebChat, testIds } = WebChat;

      // TODO: Should find ways to eliminate this line.
      window.WebChat = { createStoreWithOptions, testIds };

      run(async function () {
        renderWebChat(
          {
            cardActionMiddleware:
              ({ dispatch }) =>
              next =>
              ({ cardAction }) => {
                if (cardAction.type === 'openUrl') {
                  pageObjects.sendMessageViaSendBox(`Navigating to ${cardAction.value}`);
                } else {
                  return next(cardAction);
                }
              },
            directLine: createDirectLine({ token: await testHelpers.token.fetchDirectLineToken() }),
            store: testHelpers.createStore()
          },
          document.getElementById('webchat')
        );

        await pageConditions.uiConnected();
        await pageObjects.sendMessageViaSendBox('card-actions');

        await pageConditions.suggestedActionsShown();

        const openUrlButton = document.querySelector(('[role="form"] ul > li:first-child button'));

        await host.click(openUrlButton);

        await pageConditions.numActivitiesShown(4);
        await pageConditions.allOutgoingActivitiesSent();

        await host.snapshot('local');
      });
    </script>
  </body>
</html>
